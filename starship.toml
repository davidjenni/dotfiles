[dotnet]
symbol = "ŅØ┐ "
style = "bg:base"
format = '[ $symbol ($version) ($tfm)]($style)'

[docker_context]
symbol = "’īł "
style = "bg:base"
format = '[ $symbol $context ]($style) $path'

[nodejs]
