"$schema" = 'https://starship.rs/config-schema.json'

palette = "catppuccin_frappe"

add_newline = true
command_timeout = 10000

format = """
$os\
$directory\
$git_branch\
$git_status\
$dotnet\
$nodejs\
$rust\
$golang\
$docker_context\
$cmd_duration\
$time\
$character"""

[character]
